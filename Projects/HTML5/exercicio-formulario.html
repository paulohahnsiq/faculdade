<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercicio de formularios</title>
</head>
<body>
    <h1>Exercicio de formularios</h1>
    <form action="processa.html" method="GET">
        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome</label><br>
            <input type="text" name="nome" id="nome"><br>

            <label for="email">Email</label><br>
            <input type="email" name="email" id="email"><br>

            <input type="checkbox" name="receber" id="receber" value="ativado">
            <label for="receber">Quero receber e-mail</label><br><br>

            <label for="senha">Senha</label>
            <input type="password" name="senha" id="senha">

        </fieldset>
        <fieldset>
            <legend>Informacoes adicionais</legend>
            <input type="radio" name="tipo" id="pf">
            <label for="pf">Pessoa Fisica</label>
            <input type="radio" name="tipo" id="pj">
            <label for="pj">Pessoa Juridica</label>
        </fieldset>
        <br>
        <input type="submit" value="cadastrar">
    </form>
</body>
</html>
