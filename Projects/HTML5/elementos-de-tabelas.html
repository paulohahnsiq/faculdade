<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabelas</title>
</head>
<body>
    <H1>Tabelas</H1>
    <hr>
    <table border="1">
        <tr>
            <th>Produto</th>
            <th>Quantidade</th>
            <th>Preco</th>
        </tr>
        <tr>
            <td>Notebook</td>
            <td>1</td>
            <td>R$ 2000</td>
        </tr>
        <tr>
            <td>Smartphone</td>
            <td>2</td>
            <td>R$ 1700</td>
        </tr>
        <tr>
            <td rowspan="2">Desconto</td>
            <td style="text-align: center;" colspan="2">R$ 200</td>
        </tr>
        <tr>
            <td style="text-align: center;" colspan="2">R$ 170</td>
        </tr>
    </table>
</body>
</html>
