<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface de login do Trello</title>
    
    <!--Script estilizado trello-->
    <script src="https://unpkg.com/@codans/trello"></script>

</head>
<body>
      <img src="img/trello.svg" alt="logo trello" width="200px">
    
    
    <h1>Fazer login no Trello</h1>
    
    <form action="" method="get">
        
        <input type="text" name="email" id="email" placeholder="insira o e-mail">
        
        <input type="password" name="senha" id="senha" placeholder="insira a senha">
        
        <input type="submit" value="Fazer login">
        
        <span>Ou</span>
        
        <button><img src="img/google.svg" alt="google" width="20px"> Continuar com o Google</button>
        
        <button><img src="img/microsoft.svg" alt="microsoft" width="20px"> Continuar com a Microsoft</button>
        
        <button><img src="img/apple.svg" alt="apple" width="20px"> Continuar com a Apple</button>
        
        <button><img src="img/slack.svg" alt="slack" width="20px"> Continuar com o Slack</button>
    </form>
    
    
    <img src="img/atlassian.svg" alt="logo atlassian" width="200px">

    <img src="img/analytics.svg" alt="" width="200px">

    <img src="img/interactive.svg" alt="" width="200px">
</body>
</html>
