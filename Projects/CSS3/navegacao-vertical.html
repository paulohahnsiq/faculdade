<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navegação Vertical</title>
    <style>
        #menu-lateral {
            width: 200px;
        }
        #menu-lateral ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
        }
        a{
            padding: 0.5em 1.5em;
            display: block;
            color: black;
            text-decoration: none;
            background:orange url(img/seta.png) no-repeat 0.5em center;
        }
        a:hover {
            padding-left: 2.5em;
            background: orangered url(img/seta.png) no-repeat 1.5em center;
            color: white;
        }
        a:active{
            background-color: grey;
        }
    </style>
</head>
<body>
    <h1>Menu de Navegação</h1>
    <div id="menu-lateral">
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Produtos</a></li>
            <li><a href="#">Carrinho</a></li>
            <li><a href="#">Contato</a></li>
        </ul>
    </div>
</body>
</html>
