<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobreposição de Elementos</title>
    <style>
        .caixa1{
            border: 1px solid blue;
            background-color: lightblue;
            width: 100px;
            height: 100px;
            position: relative;
            z-index: 2;
        }
        .caixa2{
            border: 1px solid red;
            background-color: lightcoral;
            width: 100px;
            height: 100px;
            position: relative;
            top: -30px;
            left: 60px;
            z-index: 0;
        }
        .caixa3{
            border: 1px solid green;
            background-color: lightgreen;
            width: 100px;
            height: 100px;
            top: -60px;
            left: 120px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="caixa1">caixa 1</div>
    <div class="caixa2">caixa 2</div>
    <div class="caixa3">caixa 3</div>
</body>
</html>
