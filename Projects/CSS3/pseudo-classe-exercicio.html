<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        #menu{
            padding: 15px;
        }
        .menu{
            padding: 15px;
            text-decoration: none;
            color: purple;
            word-spacing: 0px;
        }
        div>p{
            text-align: left;
            padding: 40px;
            color: white;
            font-size: 1.5em;
        }
        #container{
            width: 1390px;
            height: 500px;
            background: rgb(17, 17, 17) url(img/inteligencia-artificial-empresas-Latam-e1717502215976.webp) fixed no-repeat top right;
        }
        div>h1{
            padding: 40px;
            text-align: left;
            color: white;
        }
        .menu:hover{
            background-color: rgb(26, 26, 26);
            color: white;
        }
        
        #botao{
            padding: 10px;
            border: white 1px solid;
            background-color: black;
            color: white;
            margin-left: 200px;
        }
        #botao:hover{
            background-color: white;
            color: black;
        }

    </style>
    <title>Pseudo-classe</title>
</head>
<body>
    <div id="menu">
        <a href="" class="menu">Home</a>
        <a href="" class="menu">Sobre</a>
        <a href="" class="menu">Empresa</a>
        <a href="" class="menu">Produtos</a>
        <a href="" class="menu">Contato</a> 
    </div>
    <div id="container">
        <h1>INTELIGÊNCIA ARTIFICIAL <br> QUE TRANSFORMA IDEIAS <br> EM RESULTADOS...</h1>
        <p>Automatize processos, tome decisões mais inteligentes <br> e leve seu negócio para o próximo nível <br> com soluções em IA feitas para o mundo real.</p>
        <input type="button" value="Saiba mais" id="botao">
    </div>
</body>
</html>
